<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>beatmania</title>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
      </div>
      <div id="hud-stack">
        <div id="score-hud">
          <div id="score-hud-label">SCORE</div>
          <div id="score-value">0</div>
        </div>
        <div id="track-info">
          <div id="track-info-title"></div>
          <div id="track-info-producer"></div>
        </div>
        <div id="status-hud"></div>
      </div>
      <div id="game-title" class="text-metallic">Beejay's Deejay Jackey</div>
      <div id="game-subtitle">Produced by Beejay (Yim Bongjin) in 2026</div>
      <button id="stop-button" type="button">⏹ 중단</button>
      <div id="calibration-status"></div>
      <div id="start-overlay">
        <div id="leaderboard-header">
          <div id="leaderboard-tagline-row">
            <div id="leaderboard-tagline" class="text-metallic">Masta Beejay Beat Breaker</div>
            <svg id="p2b-badge" viewBox="0 0 110 44" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="P2B 2.10">
              <defs>
                <linearGradient id="p2bTopFace" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#fff9e6" />
                  <stop offset="50%" stop-color="#ffe98a" />
                  <stop offset="100%" stop-color="#fff9e6" />
                </linearGradient>
                <linearGradient id="p2bFrontFace" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#fff6d8" />
                  <stop offset="28%" stop-color="#ffd200" />
                  <stop offset="55%" stop-color="#9a6a00" />
                  <stop offset="78%" stop-color="#ffd200" />
                  <stop offset="100%" stop-color="#fff6d8" />
                </linearGradient>
              </defs>
              <polygon points="18,8 92,8 100,3 26,3" fill="url(#p2bTopFace)" stroke="#9a6a00" stroke-width="0.5" />
              <polygon points="18,8 92,8 100,34 10,34" fill="url(#p2bFrontFace)" stroke="#7a5200" stroke-width="1" />
              <text x="55" y="27" text-anchor="middle" font-family="Orbitron, sans-serif" font-weight="800" font-size="16" fill="#4a2f00">P2B 2.10</text>
            </svg>
          </div>
        </div>
        <div id="leaderboard-section">
          <div id="leaderboard-title" class="text-metallic-gold">BEST 20 RECORD</div>
          <div id="leaderboard-panel">
            <table id="leaderboard-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>이름</th>
                  <th>사진</th>
                  <th>메세지</th>
                  <th>점수</th>
                  <th>속도</th>
                  <th>난이도</th>
                  <th>BGM</th>
                  <th>기록일</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </div>
        </div>
        <div id="song-select">
          <div id="settings-row">
            <div id="bgm-mode-select">
              <label>
                <input type="radio" name="bgm-mode" id="bgm-mode-test" value="test" />
                무반주 연습 트랙
              </label>
              <label>
                <input type="radio" name="bgm-mode" id="bgm-mode-default" value="default" checked />
                YBJ 힙합 트랙
              </label>
            </div>
            <label id="song-file-label" for="song-file-input">🎵 자유 음원 트랙</label>
            <input type="file" id="song-file-input" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg,.flac" />
            <label class="settings-select-label">속도
              <select id="speed-select">
                <option value="slow">느림</option>
                <option value="normal" selected>보통</option>
                <option value="fast">빠름</option>
              </select>
            </label>
            <label class="settings-select-label">난이도
              <select id="difficulty-select">
                <option value="easy" selected>쉬움</option>
                <option value="normal">보통</option>
                <option value="hard">어려움</option>
              </select>
            </label>
          </div>
        </div>
        <label id="calibration-toggle-label">
          <input type="checkbox" id="calibration-toggle" />
          나의 손가락 위치 보정 건반 설계
        </label>
        <div id="start-actions">
          <button id="start-button" type="button">Let's Start BDJ</button>
          <button id="guestbook-open-card" type="button">
            <span id="guestbook-card-title">Beejay's Guest Board</span>
            <span id="guestbook-card-sub">방명록 보러가기</span>
          </button>
        </div>
        <p id="visitor-welcome">Welcome to MastaBeejay World : <span id="visitor-count">-</span> Manias.</p>
      </div>
      <div id="guestbook-overlay">
        <div id="guestbook-overlay-panel">
          <div id="guestbook-title" class="text-metallic-gold">Beejay's Guest Board</div>
          <div id="guestbook-list"></div>
          <form id="guestbook-form">
            <input type="text" id="guestbook-name" placeholder="이름" maxlength="12" required />
            <input type="text" id="guestbook-message" placeholder="메세지를 남겨주세요" maxlength="80" required />
            <input type="password" id="guestbook-password" placeholder="비밀번호 (수정/삭제용)" maxlength="20" required />
            <button type="submit" id="guestbook-submit">등록</button>
          </form>
          <button id="guestbook-close-button" type="button">닫기</button>
        </div>
      </div>
      <div id="results-overlay">
        <div id="results-title" class="text-metallic">RESULT</div>
        <div id="results-score-label">TOTAL SCORE</div>
        <div id="results-score">0</div>
        <div id="results-breakdown"></div>
        <button id="results-confirm-button" type="button">확인</button>
      </div>
      <div id="name-entry-overlay">
        <div id="name-entry-title" class="text-metallic-gold">TOP 20 진입!</div>
        <p id="name-entry-desc">이름과 메세지를 남겨주세요</p>
        <input type="text" id="name-entry-name" maxlength="12" placeholder="이름" />
        <input type="text" id="name-entry-message" maxlength="40" placeholder="한마디 메세지" />
        <button id="name-entry-submit" type="button">등록</button>
      </div>
      <div id="photo-countdown-overlay">
        <div id="photo-countdown-desc"></div>
        <div id="photo-countdown-number">5</div>
      </div>
      <div id="photo-lightbox-overlay">
        <img id="photo-lightbox-image" src="" alt="Best 20 기념 사진" />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
